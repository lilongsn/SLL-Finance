<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLL记账</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-slate-700 select-none">
    <nav class="max-w-md mx-auto bg-white/80 backdrop-blur-md sticky top-0 px-6 py-4 flex justify-between items-center z-50 border-b border-gray-50">
        <a href="/" class="text-xl font-black text-indigo-600 tracking-tighter">SLL记账</a>
        <div class="flex gap-4">
            {% if current_user.is_authenticated %}
            <a href="/" class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition">首页</a>
            <a href="{{ url_for('logout') }}" class="text-xs font-bold text-red-300">退出</a>
            {% endif %}
        </div>
    </nav>
    <div class="max-w-md mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
